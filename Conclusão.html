<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conclusão - Engenharia de Software</title>

    <link rel="stylesheet" href="Style.css">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1a1f3a, #0d0f1c);
            font-family: 'Segoe UI', sans-serif;
            perspective: 1200px;
        }

        /* 🔥 SLIDE */
        .slide {
            width: 850px;
            max-width: 90%;

            /* 🔥 AJUSTE AQUI (conteúdo levemente à esquerda) */
            padding: 50px 80px 50px 40px;

            border-radius: 20px;
            background: linear-gradient(145deg, #141933, #0f1226);
            box-shadow: 0 0 40px rgba(108,121,255,0.3), inset 0 0 20px rgba(255,255,255,0.05);
            border: 2px solid rgba(108,121,255,0.3);
            position: relative;
            text-align: center;

            animation: pageIn 0.8s ease;
            transform-origin: right;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        @keyframes pageIn {
            from {
                opacity: 0;
                transform: rotateY(90deg) translateX(50px);
            }
            to {
                opacity: 1;
                transform: rotateY(0deg) translateX(0);
            }
        }

        /* SAÍDA */
        .page-out {
            animation: pageOut 0.8s ease forwards;
            transform-origin: right;
            backface-visibility: hidden;
        }

        @keyframes pageOut {
            0% {
                transform: rotateY(0deg);
                opacity: 1;
            }
            100% {
                transform: rotateY(90deg) translateX(50px);
                opacity: 0;
            }
        }

        /* LOMBADA DIREITA */
        .slide::before {
            content: "";
            position: absolute;
            right: 0;
            top: 0;
            width: 35px;
            height: 100%;
            border-radius: 0 20px 20px 0;
            background: linear-gradient(to left, #0b0e1f, #1a1f3a 40%, #0b0e1f);
            box-shadow: inset 5px 0 10px rgba(0,0,0,0.6),
                        inset -5px 0 10px rgba(255,255,255,0.05);
        }

        .slide::after {
            content: "";
            position: absolute;
            right: 10px;
            top: 10%;
            width: 15px;
            height: 80%;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255,255,255,0.08),
                rgba(255,255,255,0.08) 2px,
                transparent 2px,
                transparent 12px
            );
            border-radius: 10px;
        }

        .inner-border {
            position: absolute;
            inset: 10px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            pointer-events: none;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 3px;
            color: #a8b2ff;
            margin-bottom: 20px;
        }

        .mensagem {
            font-size: 1.1rem;
            color: #cfd6ff;
            margin-bottom: 30px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        button {
            padding: 10px 25px;
            border-radius: 10px;
            border: none;
            background: #6c79ff;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #4e5bd9;
            transform: scale(1.05);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .download-box {
            margin: 25px 0 10px;
            position: relative;
            z-index: 3;
        }

        .download-button {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 10px;
            background: #6c79ff;
            color: white;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 0 24px rgba(108,121,255,0.45);
            transition: 0.3s;
        }

        .download-button:hover {
            background: #4e5bd9;
            transform: scale(1.05);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: 1s;
        }

        .overlay.show {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay"></div>

    <div class="slide" id="slide">

        <div class="inner-border"></div>

        <h1>Fim da Apresentação</h1>

        <div class="mensagem">
            Obrigado pela atenção.<br>
            Engenharia de Software é a base para sistemas confiáveis,
            eficientes e preparados para o futuro.
        </div>

        <div class="download-box">
            <a class="download-button" href="Modelo%20Seminário%20(Quase%20Concluído).pdf" download>Baixar artigo do seminário</a>
        </div>

        <div class="nav-buttons">
            <button type="button" data-link="Referências.html" onclick="transicao(event)">⬅ Voltar</button>
            <button type="button" onclick="finalizar()">Encerrar</button>
        </div>

        <div class="footer">
            SWEBOK • Engenharia de Software
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
