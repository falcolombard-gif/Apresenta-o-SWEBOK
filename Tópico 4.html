<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tema 4 - Áreas de Conhecimento</title>

    <link rel="stylesheet" href="Style.css">

    <style>
        body {
            perspective: 1200px;
        }

        /* 🔥 ENTRADA (vindo da direita) */
        .slide {
            animation: pageIn 0.8s ease;
            transform-origin: right;
            position: relative;
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        @keyframes pageIn {
            from {
                opacity: 0;
                transform: rotateY(90deg) translateX(50px);
            }

            to {
                opacity: 1;
                transform: rotateY(0deg) translateX(0);
            }
        }

        /* 🔥 SAÍDA (virando pra esquerda) */
        .page-out {
            animation: pageOut 0.8s ease forwards;
            transform-origin: left;
            backface-visibility: hidden;
        }

        @keyframes pageOut {
            0% {
                transform: rotateY(0deg);
                opacity: 1;
            }

            100% {
                transform: rotateY(-90deg) translateX(-50px);
                opacity: 0;
            }
        }

        /* AJUSTES */
        .content-box {
            max-width: 650px;
            padding: 60px 30px 30px 30px;
        }

        .areas {
            margin-top: 20px;
        }

        .box {
            text-align: center;
            transition: 0.3s;
        }

            .box:hover {
                transform: translateY(-8px);
                background: rgba(255, 255, 255, 0.1);
            }

        /* BOTÃO INTRODUÇÃO */
        .btn-introducao {
            position: absolute;
            top: 15px;
            left: 15px;
            padding: 8px 15px;
            border-radius: 8px;
            background: #6c79ff;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            z-index: 10;
        }

            .btn-introducao:hover {
                background: #4e5bd9;
            }

        /* BOTÕES */
        .nav-buttons {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

    <div class="slide" id="slide">

        <div class="content-box">

            <button type="button" class="btn-introducao" onclick="irIntroducao()">Introdução ⬅</button>

            <h1>Áreas de Conhecimento</h1>

            <div class="grid areas">
                <div class="box">Requisitos</div>
                <div class="box">Projeto e Design</div>
                <div class="box">Desenvolvimento</div>
                <div class="box">Testes</div>
                <div class="box">Qualidade</div>
                <div class="box">Manutenção</div>
            </div>

            <div class="placeholder">
                O artigo destaca que versões recentes do SWEBOK também incorporam Arquitetura de Software, Operações de Software e Segurança de Software.
            </div>

            <div class="nav-buttons">
                <button type="button" data-link="Tópico 3.html" onclick="transicao(event)">⬅ Voltar</button>
                <button type="button" data-link="Tópico 5.html" onclick="transicao(event)">Próximo ➡</button>
            </div>

        </div>

        <div class="footer">
            Tema 4 - Engenharia de Software
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
